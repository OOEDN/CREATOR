  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Raleway', 'sans-serif'],
            heading: ['Poppins', 'sans-serif'],
          },
          colors: {
            ooedn: {
              black: '#0a0a0a',
              dark: '#171717',
              gray: '#262626',
              accent: '#ffffff',
              danger: '#ef4444',
            }
          },
          fontWeight: {
            black: '900',
          }
        },
      },
    }
  </script>
  <style>
    body {
      background-color: #0a0a0a;
      color: #ffffff;
      font-family: 'Raleway', sans-serif;
    }

    h1,
    h2,
    h3,
    h4,
    .font-heading {
      font-family: 'Poppins', sans-serif;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #171717;
    }

    ::-webkit-scrollbar-thumb {
      background: #404040;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #525252;
    }

    /* === LIGHT MODE === */
    .light-mode body,
    body.light-mode {
      background-color: #f5f5f5 !important;
      color: #1a1a1a !important;
    }

    .light-mode .bg-ooedn-black,
    .light-mode .bg-black {
      background-color: #ffffff !important;
    }

    .light-mode .bg-ooedn-dark {
      background-color: #f9f9f9 !important;
    }

    .light-mode .bg-ooedn-gray {
      background-color: #f0f0f0 !important;
    }

    .light-mode .bg-black\/40,
    .light-mode .bg-black\/60 {
      background-color: rgba(0, 0, 0, 0.03) !important;
    }

    .light-mode .border-neutral-800 {
      border-color: #e5e5e5 !important;
    }

    .light-mode .border-neutral-700 {
      border-color: #d4d4d4 !important;
    }

    .light-mode .text-white {
      color: #1a1a1a !important;
    }

    .light-mode .text-neutral-400 {
      color: #737373 !important;
    }

    .light-mode .text-neutral-500 {
      color: #525252 !important;
    }

    .light-mode .text-neutral-600 {
      color: #404040 !important;
    }

    .light-mode .text-neutral-700 {
      color: #525252 !important;
    }

    .light-mode .bg-neutral-900 {
      background-color: #e5e5e5 !important;
    }

    .light-mode .bg-neutral-800 {
      background-color: #ebebeb !important;
    }

    .light-mode .hover\:bg-neutral-800:hover {
      background-color: #e0e0e0 !important;
    }

    .light-mode .hover\:bg-neutral-900:hover {
      background-color: #d4d4d4 !important;
    }

    .light-mode .hover\:text-white:hover {
      color: #000000 !important;
    }

    .light-mode .bg-ooedn-dark\/80 {
      background-color: rgba(249, 249, 249, 0.9) !important;
    }

    .light-mode .border-white\/5,
    .light-mode .border-white\/10 {
      border-color: rgba(0, 0, 0, 0.06) !important;
    }

    .light-mode ::-webkit-scrollbar-track {
      background: #f0f0f0;
    }

    .light-mode ::-webkit-scrollbar-thumb {
      background: #c0c0c0;
    }

    .light-mode .placeholder-neutral-700::placeholder {
      color: #a3a3a3 !important;
    }

    .light-mode .placeholder\:text-neutral-700::placeholder {
      color: #a3a3a3 !important;
    }

    .light-mode input,
    .light-mode textarea,
    .light-mode select {
      color: #1a1a1a !important;
    }

    .light-mode .bg-transparent {
      background-color: transparent !important;
    }

    /* === MOBILE RESPONSIVE === */
    @media (max-width: 768px) {
      .mobile-sidebar {
        display: none !important;
      }

      .mobile-header {
        padding-left: 1rem !important;
        padding-right: 1rem !important;
        height: 56px !important;
      }

      .mobile-main {
        padding: 1rem !important;
        padding-bottom: 80px !important;
      }

      .mobile-grid-1 {
        grid-template-columns: 1fr !important;
      }

      .mobile-bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        z-index: 999;
        background: #171717;
        border-top: 1px solid #262626;
        display: flex;
        justify-content: space-around;
        padding: 6px 0 max(6px, env(safe-area-inset-bottom));
      }

      .light-mode .mobile-bottom-nav {
        background: #ffffff;
        border-color: #e5e5e5;
      }

      .mobile-bottom-nav button {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 4px 4px;
        min-width: 0;
      }

      .mobile-bottom-nav .nav-label {
        font-size: 8px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        white-space: nowrap;
      }

      /* Header + search */
      header {
        height: 56px !important;
        padding-left: 1rem !important;
        padding-right: 1rem !important;
      }

      header h2 {
        font-size: 0.875rem !important;
      }

      /* Main content areas — prevent horizontal overflow */
      main {
        overflow-x: hidden !important;
      }

      main>div {
        overflow-x: hidden !important;
      }

      /* Force all grid layouts to single column on mobile */
      .grid-cols-2,
      .grid-cols-3,
      .grid-cols-4,
      .lg\:grid-cols-2,
      .lg\:grid-cols-3,
      .xl\:grid-cols-4,
      .md\:grid-cols-2,
      .md\:grid-cols-3 {
        grid-template-columns: 1fr !important;
      }

      /* Reduce large paddings */
      .p-8,
      .p-12,
      .px-8,
      .px-12 {
        padding: 1rem !important;
      }

      .gap-8,
      .gap-6 {
        gap: 1rem !important;
      }

      /* Creator profile modal — full width */
      [class*="fixed"][class*="inset-0"]>div {
        width: 100% !important;
        max-width: 100% !important;
      }

      /* Team task board columns stack vertically */
      .overflow-x-auto .flex.gap-4 {
        flex-direction: column !important;
      }

      /* Bottom padding to clear the bottom nav */
      .overflow-y-auto {
        padding-bottom: 60px;
      }
    }

    @media (max-width: 768px) {
      .desktop-only {
        display: none !important;
      }
    }
  </style>
