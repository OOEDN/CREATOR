name: Deploy Admin (team.ooedn.com)

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

env:
  PROJECT_ID: admin-tracker-490321
  SERVICE: ooedn-tracker
  REGION: us-west1

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci

      - name: TypeScript Build
        run: npm run build

      - name: Smoke Tests
        run: node tests/smoke.test.js
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DB_SOURCE: firestore

  deploy-admin:
    name: Deploy to Cloud Run
    needs: build-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_ADMIN }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source . \
            --project ${{ env.PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --update-env-vars "\
          CLIENT_ID=964463045186-ck53fm3viba6jsq7ctg0jd8vj9oom4ag.apps.googleusercontent.com,\
          SMTP_FROM=creator@ooedn.com,\
          SMTP_USER=create@ooedn.com,\
          GCS_BUCKET=ai-studio-bucket-850668507460-us-west1,\
          DB_SOURCE=firestore" \
            --update-secrets="API_KEY=API_KEY:latest,JWT_SECRET=JWT_SECRET:latest,SMTP_PASS=SMTP_PASS:latest" \
            --allow-unauthenticated \
            --timeout=300

      - name: Show deployment URL
        run: |
          echo "✅ Deployed to https://team.ooedn.com"
          echo "   Service URL: $(gcloud run services describe ${{ env.SERVICE }} --region ${{ env.REGION }} --project ${{ env.PROJECT_ID }} --format 'value(status.url)')"
