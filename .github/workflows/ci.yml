# OOEDN CI — Catches build errors BEFORE they go live
# This runs automatically on every push to any branch.
# It does NOT deploy — it just verifies the code builds.
# If the build fails, you'll see a red ❌ on the commit in GitHub.
# If it passes, you'll see a green ✅.
#
# To rollback: just delete this file. No app code is affected.

name: CI — Build Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build-check:
    name: 🏗️ Verify Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit
        continue-on-error: true  # Don't block on existing type errors, just report them

      - name: Build app
        run: npm run build

  lint-check:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for common issues
        run: |
          echo "📋 Checking for undefined Firestore values..."
          ! grep -rn "|| undefined" routes/ --include="*.js" || echo "⚠️  Found potential Firestore undefined values"
          
          echo ""
          echo "📋 Checking imports resolve..."
          npx tsc --noEmit 2>&1 | head -20 || true
          
          echo ""
          echo "✅ Lint check complete"
